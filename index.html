<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MitSara Nexus | Production v19</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --saf: #FF9933; --grn: #138808; --nvy: #000080; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { background: #fff; padding: 12px 20px; border-bottom: 3px solid var(--nvy); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .brand { font-weight: 900; color: var(--nvy); font-size: 0.9rem; }
        .chakra { animation: spin 18s linear infinite; font-size: 1.2rem; color: var(--nvy); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        main { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 130px; }
        .card { background: #fff; border-radius: 18px; padding: 15px; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .label { font-size: 0.6rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; }

        #term { background: #000; color: #00ff00; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.65rem; height: 85px; overflow-y: auto; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 10px; font-size: 0.8rem; background: #fafafa; font-family: 'Courier New', monospace; }

        /* --- THE FLOATING ISLAND --- */
        .island { position: fixed; bottom: 25px; left: 12px; right: 12px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); height: 75px; border-radius: 40px; border: 1px solid rgba(0,0,128,0.15); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 5000; }
        .island-btn { background: none; border: none; color: var(--nvy); font-size: 0.55rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
        .bolt { width: 65px; height: 65px; border-radius: 50%; background: var(--nvy); color: #fff; border: 5px solid var(--bg); position: relative; top: -30px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 5px 15px rgba(0,0,128,0.4); }

        /* --- MODAL SYSTEM --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-body { background: #fff; border-radius: 25px; padding: 25px; width: 100%; max-width: 420px; position: relative; border-top: 8px solid var(--nvy); }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 1.2rem; color: #ccc; cursor: pointer; }
        .close-icon:hover { color: var(--nvy); }
    </style>
</head>
<body>

<header>
    <i class="fas fa-dharmachakra chakra"></i>
    <div class="brand">MIT<span>SARA</span> v19</div>
    <div style="display:flex; gap:18px">
        <i class="fas fa-file-csv" onclick="toggleModal('csv-modal')" title="CSV Transformer" style="color:var(--nvy)"></i>
        <i class="fas fa-sliders-h" onclick="toggleModal('param-modal')" title="Parameters" style="color:var(--nvy)"></i>
        <i class="fas fa-code" onclick="toggleModal('logic-modal')" title="Custom Logic" style="color:var(--nvy)"></i>
    </div>
</header>

<main>
    <div class="card">
        <span class="label">Knowledge Pipeline</span>
        <div onclick="document.getElementById('file-in').click()" style="border: 2px dashed var(--saf); padding: 20px; text-align: center; border-radius: 14px; cursor: pointer; color: var(--nvy); font-weight: 800; font-size: 0.75rem; background: #fff;">
            <i class="fas fa-cloud-arrow-up" style="font-size: 1.5rem; margin-bottom: 5px; color: var(--saf);"></i><br>
            INGEST SOURCE (PDF/TXT)
            <input type="file" id="file-in" hidden onchange="handleInflow(this.files[0])">
        </div>
        <div id="term">> Nexus: Awaiting Knowledge Stream...</div>
    </div>

    <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div>
            <span class="label">Logic Strategy</span>
            <select id="type-sel" style="width:100%; padding:10px; border-radius:8px; border:1px solid #eee;">
                <option value="cot">CoT (Chain)</option>
                <option value="rag">RAG/Vector</option>
                <option value="qa">Clean Q&A</option>
                <option value="custom">Custom JSON</option>
            </select>
        </div>
        <div>
            <span class="label">Model Header</span>
            <select id="template-sel" style="width:100%; padding:10px; border-radius:8px; border:1px solid #eee;">
                <option value="raw">Raw JSON</option>
                <option value="llama3">Llama-3</option>
                <option value="mistral">Mistral</option>
            </select>
        </div>
    </div>

    <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <span class="label">Intelligence Stream</span>
        <textarea id="nexus-out" style="flex: 1;" placeholder="Dataset output..."></textarea>
    </div>
</main>

<div class="island">
    <button class="island-btn" onclick="copyData()"><i class="fas fa-copy"></i><span>COPY</span></button>
    <button class="island-btn" onclick="shareData()"><i class="fas fa-share-nodes"></i><span>SHARE</span></button>
    <div class="bolt" onclick="ignite()"><i class="fas fa-bolt"></i></div>
    <button class="island-btn" onclick="downloadData()"><i class="fas fa-download"></i><span>EXPORT</span></button>
    <button class="island-btn" onclick="location.reload()"><i class="fas fa-sync"></i><span>RESET</span></button>
</div>

<div id="param-modal" class="modal">
    <div class="modal-body">
        <i class="fas fa-times close-icon" onclick="toggleModal('param-modal')"></i>
        <h3 style="margin-top:0; color:var(--nvy)">Semantic Parameters</h3>
        <label class="label">Chunk Size</label>
        <input type="number" id="chunk-size" value="1500" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px;">
        <button onclick="toggleModal('param-modal')" style="width:100%; background:var(--grn); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">APPLY CONFIG</button>
    </div>
</div>

<div id="csv-modal" class="modal">
    <div class="modal-body">
        <i class="fas fa-times close-icon" onclick="toggleModal('csv-modal')"></i>
        <h3 style="margin-top:0; color:var(--nvy)">CSV-to-JSON Transformer</h3>
        <p style="font-size: 0.7rem; color: #666;">Paste CSV data (Instruction, Input, Output) to convert to templated JSON.</p>
        <textarea id="csv-input" rows="6" placeholder="instruction,input,output&#10;Explain math,2+2,4"></textarea>
        <button onclick="transformCSV()" style="width:100%; margin-top:15px; background:var(--saf); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">TRANSFORM DATA</button>
    </div>
</div>

<div id="logic-modal" class="modal">
    <div class="modal-body">
        <i class="fas fa-times close-icon" onclick="toggleModal('logic-modal')"></i>
        <h3 style="margin-top:0; color:var(--nvy)">Custom Logic Template</h3>
        <textarea id="custom-json" rows="6" placeholder='{"instruction": "...", "output": "..."}'></textarea>
        <button onclick="toggleModal('logic-modal')" style="width:100%; margin-top:15px; background:var(--nvy); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">ACTIVATE</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let db = [];
    let activeText = "";

    function log(m) {
        const l = document.getElementById('term');
        l.innerHTML += `<br>> ${m}`;
        l.scrollTop = l.scrollHeight;
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === "flex") ? "none" : "flex";
    }

    async function handleInflow(f) {
        if(!f) return;
        log(`Ingesting: ${f.name}`);
        if(f.type === "application/pdf") {
            const buffer = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
            let text = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
            activeText = text.replace(/\s+/g, ' ').trim();
        } else { activeText = await f.text(); }
        log(`Success: ${activeText.length} chars ready.`);
    }

    function ignite() {
        if(!activeText) return alert("Ingest knowledge first!");
        log("Executing Pipeline...");
        const entry = {
            instruction: "MitSara Intelligence Request",
            input: activeText.substring(0, 1000),
            output: "Generated Logic Stream...",
            ts: Date.now()
        };
        db.push(entry);
        document.getElementById('nexus-out').value = JSON.stringify(db, null, 2);
    }

    function transformCSV() {
        const csv = document.getElementById('csv-input').value;
        const lines = csv.split('\n');
        lines.slice(1).forEach(line => {
            const cols = line.split(',');
            if(cols.length >= 3) {
                db.push({ instruction: cols[0], input: cols[1], output: cols[2] });
            }
        });
        document.getElementById('nexus-out').value = JSON.stringify(db, null, 2);
        log("CSV Data Merged into Dataset.");
        toggleModal('csv-modal');
    }

    function copyData() {
        const box = document.getElementById('nexus-out');
        box.select();
        document.execCommand('copy');
        alert("Copied!");
    }

    function downloadData() {
        if(db.length === 0) return alert("Empty DB.");
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MitSara_Nexus_v19.json`;
        a.click();
    }

    function shareData() {
        if(navigator.share) navigator.share({title: 'MitSara Dataset', text: 'Dataset export ready.'});
    }
</script>
</body>
</html>
