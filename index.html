<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MitSara Nexus | Elite v16</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --saf: #FF9933; --grn: #138808; --nvy: #000080; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { background: #fff; padding: 12px 20px; border-bottom: 3px solid var(--nvy); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .brand { font-weight: 900; font-size: 1rem; color: var(--nvy); letter-spacing: 1px; }
        .chakra { animation: spin 20s linear infinite; font-size: 1.3rem; color: var(--nvy); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Workspace */
        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 110px; }
        .card { background: #fff; border-radius: 16px; padding: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .label { font-size: 0.6rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }

        /* Framework Selectors */
        select, textarea, input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #edf2f7; font-size: 0.8rem; background: #fff; }
        #term { background: #0f172a; color: #38bdf8; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.65rem; height: 80px; overflow-y: auto; }

        /* Floating Island */
        .island { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); height: 70px; border-radius: 35px; border: 1px solid rgba(0,0,128,0.1); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; }
        .island-btn { background: none; border: none; color: var(--nvy); font-size: 0.55rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
        .island-btn i { font-size: 1.1rem; }
        .bolt { width: 60px; height: 60px; border-radius: 50%; background: var(--nvy); color: #fff; border: 5px solid var(--bg); position: relative; top: -25px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; box-shadow: 0 5px 15px rgba(0,0,128,0.3); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: #fff; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-dharmachakra chakra"></i>
    <div class="brand">MITSARA <span>NEXUS v16</span></div>
    <i class="fas fa-code" onclick="toggleModal('custom-logic-modal')" style="color:var(--nvy)"></i>
</header>

<main>
    <div class="card">
        <span class="label">Knowledge Hub</span>
        <div onclick="document.getElementById('file-in').click()" style="border: 2px dashed var(--saf); padding: 18px; text-align: center; border-radius: 12px; cursor: pointer; color: var(--nvy); font-weight: bold; font-size: 0.7rem; background: #fff;">
            <i class="fas fa-file-export" style="font-size: 1.2rem; margin-bottom: 5px; color: var(--saf);"></i><br>
            INGEST SOURCE (PDF/TXT)
            <input type="file" id="file-in" hidden onchange="handleInflow(this.files[0])">
        </div>
        <div id="term">> Intelligence System Ready...</div>
    </div>

    <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div>
            <span class="label">Output Type</span>
            <select id="type-select">
                <option value="cot">Chain of Thought</option>
                <option value="tot">Tree of Thought</option>
                <option value="race">RACE Format</option>
                <option value="react">ReAct Logic</option>
                <option value="qna">Clean Q&A</option>
                <option value="rag">RAG Embedding</option>
                <option value="chunks">Vector Chunks</option>
                <option value="custom">Custom Logic</option>
            </select>
        </div>
        <div>
            <span class="label">Architecture</span>
            <select id="arch-select">
                <option value="llama3">Llama-3</option>
                <option value="mistral">Mistral</option>
                <option value="phi3">Phi-3</option>
            </select>
        </div>
    </div>

    <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <span class="label">Intelligence Stream</span>
        <textarea id="out-box" style="flex: 1;" placeholder="Engineered dataset will stream here..."></textarea>
    </div>
</main>

<div class="island">
    <button class="island-btn" onclick="copyData()"><i class="fas fa-copy"></i><span>COPY</span></button>
    <button class="island-btn" onclick="shareData()"><i class="fas fa-share-nodes"></i><span>SHARE</span></button>
    <div class="bolt" onclick="ignite()"><i class="fas fa-bolt"></i></div>
    <button class="island-btn" onclick="downloadData()"><i class="fas fa-download"></i><span>EXPORT</span></button>
    <button class="island-btn" onclick="location.reload()"><i class="fas fa-sync"></i><span>RESET</span></button>
</div>

<div id="custom-logic-modal" class="modal">
    <div class="modal-body">
        <h3 style="margin-top:0">Custom Logic Loader</h3>
        <p style="font-size: 0.7rem; color: #666;">Paste a sample JSON entry to train the engine on your specific logical flow.</p>
        <textarea id="custom-json-input" rows="8" placeholder='{"instruction": "...", "output": "..."}'></textarea>
        <button onclick="saveCustomLogic()" style="width:100%; margin-top:15px; background:var(--nvy); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">ACTIVATE CUSTOM ENGINE</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let masterDB = [];
    let activeText = "";
    let customTemplate = null;

    function log(m) {
        const t = document.getElementById('term');
        t.innerHTML += `<br>> ${m}`;
        t.scrollTop = t.scrollHeight;
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === "flex") ? "none" : "flex";
    }

    function saveCustomLogic() {
        try {
            customTemplate = JSON.parse(document.getElementById('custom-json-input').value);
            document.getElementById('type-select').value = "custom";
            log("Custom Logic Engine Activated.");
            toggleModal('custom-logic-modal');
        } catch(e) { alert("Invalid JSON Format."); }
    }

    async function handleInflow(f) {
        if(!f) return;
        log(`Parsing: ${f.name}`);
        if(f.type === "application/pdf") {
            const buffer = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
            let text = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
            activeText = text.replace(/\s+/g, ' ').trim();
        } else { activeText = await f.text(); }
        log(`Ingested ${activeText.length} characters.`);
    }

    function ignite() {
        if(!activeText) return alert("Ingest Source First!");
        const type = document.getElementById('type-select').value;
        log(`Executing ${type.toUpperCase()} Transformer...`);

        let outSchema = "";
        if(type === 'cot') outSchema = "Thought: [Step-by-step reasoning]\nConclusion: [Answer]";
        else if(type === 'tot') outSchema = "Node 1: [Observation]\nNode 2: [Branching]\nNode 3: [Pruning]";
        else if(type === 'react') outSchema = "Thought: ...\nAction: ...\nObservation: ...";
        else if(type === 'custom' && customTemplate) outSchema = customTemplate.output || "Custom Structure Applied";
        else outSchema = "Dataset Type: " + type;

        const entry = {
            instruction: "Intelligence Task",
            input: activeText.substring(0, 1000),
            output: outSchema,
            metadata: { type, ts: Date.now() }
        };

        masterDB.push(entry);
        document.getElementById('out-box').value = JSON.stringify(masterDB, null, 2);
    }

    function copyData() {
        const box = document.getElementById('out-box');
        box.select();
        document.execCommand('copy');
        alert("Copied!");
    }

    function downloadData() {
        if(masterDB.length === 0) return alert("Empty Dataset.");
        const blob = new Blob([JSON.stringify(masterDB, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MitSara_Nexus_v16.json`;
        a.click();
    }

    function shareData() {
        if(navigator.share) navigator.share({title: 'MitSara Nexus Export', text: document.getElementById('out-box').value.substring(0, 500)});
    }
</script>
</body>
</html>
