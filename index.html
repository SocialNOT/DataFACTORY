<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MitSara | Tiranga Pro Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --saffron: #FF9933; --white: #FFFFFF; --green: #138808; --navy: #000080; --glass: rgba(255,255,255,0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        @keyframes flow { 0% { border-color: var(--saffron); } 50% { border-color: var(--navy); } 100% { border-color: var(--green); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px var(--navy); } 50% { box-shadow: 0 0 15px var(--saffron); } 100% { box-shadow: 0 0 5px var(--navy); } }

        /* Header */
        header { background: #fff; padding: 12px 20px; border-bottom: 3px solid var(--navy); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-weight: 900; color: var(--navy); font-size: 1rem; }
        .logo span { color: var(--saffron); }

        /* Main Scrollable Area */
        main { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: var(--glass); border-radius: 12px; padding: 12px; border: 1px solid #ddd; border-top: 4px solid var(--navy); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Tool Grid */
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .tool { padding: 8px 2px; border: 1.5px solid #eee; border-radius: 8px; font-size: 0.6rem; text-align: center; font-weight: bold; cursor: pointer; background: white; transition: 0.2s; }
        .tool.active { border-color: var(--saffron); background: rgba(255,153,51,0.1); color: var(--saffron); }
        .tool i { display: block; font-size: 0.8rem; margin-bottom: 2px; }

        /* Progress Steps */
        .step-container { display: flex; justify-content: space-between; margin: 10px 0; }
        .step { width: 22%; height: 4px; background: #ddd; border-radius: 2px; position: relative; }
        .step.done { background: var(--green); }
        .step.active { background: var(--saffron); animation: flow 2s infinite; }

        /* Terminal - Collapsible */
        .terminal { background: #1e1e1e; color: #00ff00; font-family: 'Courier New', monospace; border-radius: 8px; padding: 10px; font-size: 0.7rem; display: none; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .term-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--navy); font-weight: bold; font-size: 0.7rem; }

        /* Actions */
        .exec-bar { display: flex; justify-content: center; align-items: center; padding: 15px 0; position: relative; }
        .magic-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--navy); color: white; font-size: 1.5rem; animation: pulseGlow 3s infinite; cursor: pointer; z-index: 10; }
        
        /* Footer Toolbar */
        footer { background: #fff; padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #eee; }
        .f-btn { border: none; background: none; color: var(--navy); font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .f-btn i { display: block; font-size: 1rem; margin-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>Mit</span>Sara PRO <i class="fas fa-dharmachakra"></i></div>
    <div style="font-size: 0.7rem; font-weight: bold; color: var(--green);">[INDIA LIVE]</div>
</header>

<main>
    <div class="card">
        <div onclick="document.getElementById('f-in').click()" style="border: 2px dashed var(--navy); padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.7rem; color: var(--navy); font-weight: bold;">
            <i class="fas fa-file-upload"></i> INGEST SOURCE
            <input type="file" id="f-in" hidden onchange="startPipeline(this.files[0])">
        </div>
        <div class="step-container" id="steps">
            <div class="step" title="Ingest"></div>
            <div class="step" title="Clean"></div>
            <div class="step" title="Embed"></div>
            <div class="step" title="Logic"></div>
        </div>
    </div>

    <div class="card">
        <div style="font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 8px;">Export Mode Selection</div>
        <div class="tool-grid">
            <div class="tool active" onclick="setMode(this, 'few')"><i class="fas fa-list-ol"></i> Few Shot</div>
            <div class="tool" onclick="setMode(this, 'long')"><i class="fas fa-expand"></i> Long Ctx</div>
            <div class="tool" onclick="setMode(this, 'inject')"><i class="fas fa-syringe"></i> Injection</div>
            <div class="tool" onclick="setMode(this, 'qa')"><i class="fas fa-comments"></i> Q&A</div>
        </div>
    </div>

    <div class="card">
        <div class="term-header" onclick="toggleTerm()">
            <span><i class="fas fa-terminal"></i> LIVE EXECUTION CONSOLE</span>
            <i class="fas fa-chevron-down" id="term-arrow"></i>
        </div>
        <div class="terminal" id="term-body">> Engine Initialized...<br>> Awaiting Source...</div>
    </div>

    <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <textarea id="out-txt" style="flex: 1; width: 100%; border: 1px solid #ddd; padding: 10px; font-size: 0.75rem; border-radius: 8px;" placeholder="Final dataset will appear here..."></textarea>
    </div>

    <div class="exec-bar">
        <button class="magic-btn" onclick="execute()"><i class="fas fa-bolt"></i></button>
    </div>
</main>

<footer>
    <button class="f-btn" onclick="copyData()"><i class="fas fa-copy"></i>COPY</button>
    <button class="f-btn" onclick="downloadData()"><i class="fas fa-download"></i>DOWNLOAD</button>
    <button class="f-btn" onclick="location.reload()"><i class="fas fa-sync"></i>RESET</button>
</footer>

<script>
    let currentMode = 'few';
    let masterDB = [];
    const term = document.getElementById('term-body');

    function log(msg) {
        term.innerHTML += `<br>> ${msg}`;
        term.scrollTop = term.scrollHeight;
    }

    function toggleTerm() {
        const body = document.getElementById('term-body');
        const arrow = document.getElementById('term-arrow');
        const isOpen = body.style.display === "block";
        body.style.display = isOpen ? "none" : "block";
        arrow.style.transform = isOpen ? "rotate(0deg)" : "rotate(180deg)";
    }

    function setMode(el, mode) {
        document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        currentMode = mode;
        log(`Mode switched to: ${mode.toUpperCase()}`);
    }

    async function startPipeline(file) {
        if (!file) return;
        const steps = document.querySelectorAll('.step');
        
        // Step 1: Ingest
        steps[0].className = 'step active';
        log(`Ingesting ${file.name}...`);
        
        // Simulating PDF/Text extraction
        setTimeout(() => {
            steps[0].className = 'step done';
            steps[1].className = 'step active';
            log(`Cleaning text & removing bias...`);
        }, 1000);

        setTimeout(() => {
            steps[1].className = 'step done';
            steps[2].className = 'step active';
            log(`Generating Vector Embeddings...`);
        }, 2000);

        setTimeout(() => {
            steps[2].className = 'step done';
            log(`System Ready for Logic Execution.`);
        }, 3000);
    }

    function execute() {
        const steps = document.querySelectorAll('.step');
        steps[3].className = 'step active';
        log(`Executing ${currentMode} Logic...`);
        
        setTimeout(() => {
            steps[3].className = 'step done';
            const entry = {
                instruction: "MitSara Analysis Request",
                mode: currentMode,
                output: "1. Pratijna: [Logical Base Established]\n2. Hetu: [Nyaya Verified]\n3. Nigamana: [Success]",
                timestamp: Date.now()
            };
            masterDB.push(entry);
            document.getElementById('out-txt').value = JSON.stringify(masterDB, null, 2);
            log(`Sequence Complete. Total Entries: ${masterDB.length}`);
        }, 1500);
    }

    function copyData() {
        const txt = document.getElementById('out-txt');
        txt.select();
        document.execCommand('copy');
        log("Dataset copied to clipboard.");
        alert("Copied!");
    }

    function downloadData() {
        if (masterDB.length === 0) return alert("Nothing to download.");
        const blob = new Blob([JSON.stringify(masterDB, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MitSara_${currentMode}_${Date.now()}.json`;
        a.click();
        log("File download triggered.");
    }
</script>
</body>
</html>
