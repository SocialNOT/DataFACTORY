<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MitSara | Auto-Engine 4.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --bg: #0a0c0e; --card: #161a1d; --border: #2d3436; --text: #f1f2f6; --active: #00d2d3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }

        /* Header & Counters */
        header { position: sticky; top: 0; background: rgba(10, 12, 14, 0.9); backdrop-filter: blur(15px); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .brand { color: var(--gold); font-weight: 900; letter-spacing: 1.5px; font-size: 0.8rem; }
        
        /* Modal / Selection Overlay */
        #param-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border: 1px solid var(--gold); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }

        /* Framework Selection Grid */
        .framework-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .chip { border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-size: 0.7rem; text-align: center; cursor: pointer; transition: 0.3s; background: #000; }
        .chip.selected { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); font-weight: bold; }

        /* Component Cards */
        .container { padding: 12px; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); }
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }

        textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; background: #000; color: #fff; resize: none; }
        
        .auto-btn { background: var(--gold); color: #000; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        /* Floating Navbar */
        .navbar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(45, 52, 54, 0.8); backdrop-filter: blur(10px); height: 60px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--border); }
        .nav-icon { color: #888; font-size: 1.2rem; }
        .nav-icon.active { color: var(--gold); }
    </style>
</head>
<body>

<div id="param-modal">
    <div class="modal-content">
        <h2 style="color:var(--gold); margin-top:0; font-size:1.1rem;">Configure Pipeline</h2>
        <p style="font-size:0.75rem; color:#ccc;">Select training frameworks for this batch:</p>
        <div class="framework-grid" id="frameworks">
            <div class="chip" data-val="CoT">Chain of Thought</div>
            <div class="chip" data-val="ToT">Tree of Thought</div>
            <div class="chip" data-val="RAG">RAG Embedding</div>
            <div class="chip" data-val="RACE">RACE Framework</div>
        </div>
        <button class="auto-btn" onclick="closeParams()">Apply & Convert</button>
    </div>
</div>

<header>
    <div class="brand">MITSARA CORE 4.0</div>
    <div id="status-chip" style="font-size: 0.6rem; color: var(--gold);">IDLE</div>
</header>

<div class="container">
    <div class="card">
        <span class="label"><i class="fas fa-bolt"></i> Auto-Ingestion Engine</span>
        <div style="border: 2px dashed #333; padding: 30px; text-align: center; border-radius: 15px;" onclick="document.getElementById('file-trigger').click()">
            <i class="fas fa-file-upload" style="font-size: 2rem; color: var(--gold);"></i><br>
            <span style="font-size: 0.8rem; margin-top: 10px; display: block;">Upload PDF/MD/Text</span>
            <input type="file" id="file-trigger" hidden onchange="initAutoConvert(this.files[0])">
        </div>
    </div>

    <div class="card">
        <span class="label">Knowledge Preview</span>
        <textarea id="preview-box" rows="5" placeholder="Waiting for conversion..."></textarea>
    </div>

    <div class="card">
        <span class="label">Engineered Output (Auto-Generated)</span>
        <textarea id="output-box" rows="8" placeholder="Output logic will appear here..."></textarea>
    </div>
</div>

<div class="navbar">
    <i class="fas fa-home nav-icon active"></i>
    <i class="fas fa-database nav-icon" onclick="exportBatch()"></i>
    <i class="fas fa-trash nav-icon" onclick="location.reload()"></i>
</div>

<script>
    let activeFile = null;
    let selectedFrameworks = [];
    let masterBatch = [];

    // Chip selection logic
    document.querySelectorAll('.chip').forEach(chip => {
        chip.onclick = () => {
            chip.classList.toggle('selected');
            const val = chip.getAttribute('data-val');
            if(selectedFrameworks.includes(val)) {
                selectedFrameworks = selectedFrameworks.filter(f => f !== val);
            } else {
                selectedFrameworks.push(val);
            }
        };
    });

    function initAutoConvert(file) {
        if(!file) return;
        activeFile = file;
        document.getElementById('param-modal').style.display = "flex";
    }

    async function closeParams() {
        document.getElementById('param-modal').style.display = "none";
        document.getElementById('status-chip').innerText = "CONVERTING...";
        await processFile();
    }

    async function processFile() {
        const file = activeFile;
        let text = "";
        
        if (file.type === "application/pdf") {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
        } else {
            text = await file.text();
        }

        // Clean text (remove extra whitespace, normalize)
        text = text.replace(/\s+/g, ' ').trim();
        document.getElementById('preview-box').value = text;
        
        // Auto-Generate Logic based on selected Frameworks
        generateLogic(text);
    }

    function generateLogic(text) {
        let logicPrefix = "";
        if(selectedFrameworks.includes("CoT")) logicPrefix += "[Chain of Thought Active] ";
        if(selectedFrameworks.includes("RAG")) logicPrefix += "[RAG Context Embedded] ";
        
        const output = `1. Pratijna: (Drafted from source)\n2. Hetu: ${logicPrefix}\n3. Udaharana: (Context matched)\n4. Upanaya: \n5. Nigamana: `;
        
        document.getElementById('output-box').value = output;
        document.getElementById('status-chip').innerText = "READY";
        
        // Auto-push to batch
        masterBatch.push({
            instruction: "Explain based on the provided context.",
            input: text,
            output: output,
            metadata: { frameworks: selectedFrameworks, timestamp: Date.now() }
        });
    }

    function exportBatch() {
        if(masterBatch.length === 0) return alert("No data converted yet.");
        const blob = new Blob([JSON.stringify(masterBatch, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MitSara_Batch_${Date.now()}.json`;
        a.click();
        alert("Batch Exported for Fine-Tuning.");
    }
</script>
</body>
</html>
