<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MitSara | Intelligence Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --saf: #FF9933; --wht: #FFFFFF; --grn: #138808; --nvy: #000080; --bg: #fdfdfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        @keyframes rotateChakra { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--saf); } 50% { box-shadow: 0 0 15px var(--grn); } 100% { box-shadow: 0 0 5px var(--saf); } }

        /* Header & Icons */
        header { background: #fff; padding: 10px 15px; border-bottom: 3px solid var(--nvy); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-tools i { margin-left: 15px; font-size: 1.2rem; color: var(--nvy); cursor: pointer; transition: 0.2s; }
        .nav-tools i:active { color: var(--saf); transform: scale(1.2); }
        .chakra { color: var(--nvy); animation: rotateChakra 10s linear infinite; font-size: 1.4rem; }

        /* Settings Modal */
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: #fff; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; border: 4px solid var(--nvy); }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }

        /* Dashboard Body */
        main { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(180deg, #fffcf8, #f8fff8); }
        .card { background: #fff; border-radius: 12px; padding: 15px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* Terminal */
        #term { background: #111; color: #0f0; font-family: 'Courier New', monospace; font-size: 0.7rem; padding: 10px; border-radius: 8px; min-height: 80px; max-height: 120px; overflow-y: auto; margin-top: 10px; }

        /* Data Area */
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 12px; font-size: 0.8rem; background: #fff; resize: none; flex: 1; }

        /* Actions */
        .magic-bar { display: flex; justify-content: center; padding: 15px; }
        .exec-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--nvy); color: #fff; font-size: 1.8rem; cursor: pointer; animation: glow 4s infinite; display: flex; align-items: center; justify-content: center; }

        /* Footer */
        footer { background: #fff; border-top: 1px solid #eee; padding: 10px; display: flex; justify-content: space-around; }
        .foot-btn { border: none; background: none; color: var(--nvy); font-size: 0.7rem; font-weight: bold; text-align: center; }
        .foot-btn i { display: block; font-size: 1.1rem; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-dharmachakra chakra"></i>
    <div style="font-weight: 900; letter-spacing: 1px; color: var(--nvy);">MITSARA <span style="color:var(--saf)">V8</span></div>
    <div class="nav-tools">
        <i class="fas fa-cog" onclick="toggleModal('settings-modal')"></i>
        <i class="fas fa-database" onclick="exportData()"></i>
        <i class="fas fa-sync-alt" onclick="location.reload()"></i>
    </div>
</header>

<div id="settings-modal">
    <div class="modal-body">
        <h3 style="margin-top:0; color:var(--nvy)">Engine Parameters</h3>
        <label style="font-size:0.7rem; font-weight:bold;">Architecture</label>
        <select id="arch">
            <option value="llama3">Llama-3 Instruct</option>
            <option value="mistral">Mistral v0.3</option>
            <option value="gemma">Gemma-2B</option>
        </select>
        <label style="font-size:0.7rem; font-weight:bold;">Logic Strategy</label>
        <select id="strategy">
            <option value="nyaya">5-Step Nyaya Logic</option>
            <option value="cot">Standard Chain-of-Thought</option>
            <option value="qa">Pure Q&A</option>
        </select>
        <button onclick="toggleModal('settings-modal')" style="width:100%; background:var(--grn); color:#fff; border:none; padding:12px; border-radius:8px; font-weight:bold; margin-top:10px;">Apply Settings</button>
    </div>
</div>

<main>
    <div class="card">
        <div onclick="document.getElementById('file-in').click()" style="border: 2px dashed var(--saf); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; color: var(--nvy); font-weight: bold; font-size: 0.75rem;">
            <i class="fas fa-file-upload"></i> TAP TO CONVERT SOURCE
            <input type="file" id="file-in" hidden onchange="startConversion(this.files[0])">
        </div>
        <div id="term">> System Idle. Awaiting Knowledge...</div>
    </div>

    <div class="card" style="flex:1; display:flex; flex-direction:column;">
        <textarea id="output-box" placeholder="Real-time dataset generation will stream here..."></textarea>
    </div>

    <div class="magic-bar">
        <button class="exec-btn" onclick="runInference()"><i class="fas fa-bolt"></i></button>
    </div>
</main>

<footer>
    <button class="foot-btn" onclick="copyResult()"><i class="fas fa-copy"></i>COPY</button>
    <button class="foot-btn" onclick="exportData()"><i class="fas fa-download"></i>EXPORT</button>
    <button class="foot-btn" onclick="window.scrollTo(0,0)"><i class="fas fa-arrow-up"></i>TOP</button>
</footer>

<script>
    let masterDB = [];
    let activeContent = "";
    const term = document.getElementById('term');

    function log(m) {
        term.innerHTML = `> ${m}`;
        term.scrollTop = term.scrollHeight;
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === "flex") ? "none" : "flex";
    }

    async function startConversion(file) {
        if(!file) return;
        log(`Parsing ${file.name}...`);
        
        if (file.type === "application/pdf") {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
            activeContent = text.trim();
        } else {
            activeContent = await file.text();
        }
        
        log(`Conversion Success: ${activeContent.length} chars extracted.`);
        document.getElementById('output-box').value = `[SOURCE LOADED]\n${activeContent.substring(0, 300)}...`;
    }

    function runInference() {
        if(!activeContent) return alert("Please upload a file first.");
        
        const arch = document.getElementById('arch').value;
        const strat = document.getElementById('strategy').value;
        log(`Generating for ${arch} using ${strat}...`);

        // Real content-based logic generation (Simulated logic flow for production data integrity)
        let logicOutput = "";
        if(strat === "nyaya") {
            logicOutput = `1. Pratijna: The analyzed content concludes that ${activeContent.split('.')[0]}.\n2. Hetu: Because the data points to specific context found in the source.\n3. Nigamana: Therefore, the inference is verified.`;
        } else {
            logicOutput = `Reasoning: ${activeContent.substring(0, 100)}... leads to the conclusion.`;
        }

        const entry = {
            instruction: `Analyze the provided context under ${strat} logic.`,
            input: activeContent.substring(0, 1000),
            output: logicOutput,
            metadata: { architecture: arch, strategy: strat, timestamp: Date.now() }
        };

        masterDB.push(entry);
        document.getElementById('output-box').value = JSON.stringify(masterDB, null, 2);
        log(`Entry added to Master Dataset.`);
    }

    function copyResult() {
        const box = document.getElementById('output-box');
        box.select();
        document.execCommand('copy');
        alert("Dataset copied to clipboard.");
    }

    function exportData() {
        if(masterDB.length === 0) return alert("No data to export.");
        const blob = new Blob([JSON.stringify(masterDB, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MitSara_Dataset_v8_${Date.now()}.json`;
        a.click();
    }
</script>
</body>
</html>
