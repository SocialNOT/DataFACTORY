<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MitSara | Intelligence Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #d4af37; --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.1); --text: #e0e0e0; --accent: #4834d4;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; padding-bottom: 100px; overflow-x: hidden;
        }

        /* --- STICKY DASHBOARD HEADER --- */
        header {
            position: sticky; top: 0; background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(20px); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .logo { font-weight: 900; color: var(--gold); letter-spacing: 2px; font-size: 0.8rem; }
        .stats { display: flex; gap: 10px; font-size: 0.7rem; font-weight: bold; }
        .stat-pill { background: var(--glass); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

        /* --- MAIN LAYOUT --- */
        .dashboard { padding: 15px; max-width: 800px; margin: auto; }
        
        .section-label { 
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; 
            color: var(--gold); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }

        .module { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* --- PARAMETRIC CHIPS --- */
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .chip { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            padding: 12px; border-radius: 12px; font-size: 0.7rem; 
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .chip.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); }
        .chip i { display: block; margin-bottom: 5px; font-size: 1rem; }

        /* --- INPUTS --- */
        textarea { 
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            border-radius: 12px; padding: 15px; color: #fff; font-size: 0.85rem;
            resize: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--gold); outline: none; }

        .drop-area {
            border: 2px dashed var(--border); padding: 30px; text-align: center;
            border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .drop-area:active { transform: scale(0.98); border-color: var(--gold); }

        /* --- BOTTOM NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 70px; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(25px); border-radius: 35px;
            border: 1px solid var(--border); display: flex;
            justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-btn { color: #888; font-size: 1.2rem; background: none; border: none; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .fab { 
            background: var(--gold); color: #000; width: 60px; height: 60px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; border: 5px solid var(--bg); margin-top: -50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* --- TOGGLE SWITCHES --- */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; inset: 0; background: #333; 
            border-radius: 20px; transition: 0.4s; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 14px; width: 14px; 
            left: 3px; bottom: 3px; background: white; transition: 0.4s; border-radius: 50%;
        }
        input:checked + .slider { background: var(--gold); }
        input:checked + .slider:before { transform: translateX(20px); }

    </style>
</head>
<body>

<header>
    <div class="logo">MITSARA CORE</div>
    <div class="stats">
        <div class="stat-pill"><i class="fas fa-layer-group"></i> <span id="db-count">0</span></div>
        <div class="stat-pill" style="color:var(--gold)">BETA V5</div>
    </div>
</header>

<div class="dashboard">
    <div class="section-label"><i class="fas fa-file-import"></i> Knowledge Ingestion</div>
    <div class="module">
        <div class="drop-area" onclick="document.getElementById('file-in').click()">
            <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--gold); margin-bottom: 10px;"></i>
            <div style="font-size: 0.8rem;">Tap to Process Knowledge</div>
            <div style="font-size: 0.6rem; opacity: 0.5; margin-top: 5px;">PDF, MD, TXT Supported</div>
            <input type="file" id="file-in" hidden onchange="processKnowledge(this.files[0])">
        </div>
        <textarea id="raw-preview" rows="3" style="margin-top:15px;" placeholder="Pre-processed text preview..."></textarea>
    </div>

    <div class="section-label"><i class="fas fa-project-diagram"></i> Architecture & Logic</div>
    <div class="module">
        <div class="tool-grid">
            <div class="chip active" onclick="toggleChip(this, 'CoT')"><i class="fas fa-link"></i> CoT</div>
            <div class="chip" onclick="toggleChip(this, 'ToT')"><i class="fas fa-tree"></i> ToT</div>
            <div class="chip" onclick="toggleChip(this, 'RAG')"><i class="fas fa-search"></i> RAG</div>
            <div class="chip" onclick="toggleChip(this, 'RACE')"><i class="fas fa-bolt"></i> RACE</div>
        </div>
    </div>

    <div class="section-label"><i class="fas fa-broom"></i> Data Sanitization</div>
    <div class="module">
        <div class="toggle-row">
            <span style="font-size: 0.75rem;">De-duplication Engine</span>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
            <span style="font-size: 0.75rem;">Bias Neutralization</span>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
            <span style="font-size: 0.75rem;">Auto-Anonymize PII</span>
            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
        </div>
    </div>

    <div class="section-label"><i class="fas fa-code"></i> Intelligence Output</div>
    <div class="module">
        <textarea id="output-data" rows="8" placeholder="Generated dataset structure..."></textarea>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-btn active"><i class="fas fa-th-large"></i></button>
    <button class="nav-btn" onclick="exportBatch()"><i class="fas fa-file-export"></i></button>
    <div class="fab" onclick="generate()"><i class="fas fa-magic"></i></div>
    <button class="nav-btn"><i class="fas fa-sliders-h"></i></button>
    <button class="nav-btn" onclick="location.reload()"><i class="fas fa-sync"></i></button>
</div>

<script>
    let masterData = [];
    let activeFrameworks = ['CoT'];

    function toggleChip(el, type) {
        el.classList.toggle('active');
        if (activeFrameworks.includes(type)) {
            activeFrameworks = activeFrameworks.filter(t => t !== type);
        } else {
            activeFrameworks.push(type);
        }
    }

    async function processKnowledge(file) {
        if (!file) return;
        const reader = new FileReader();
        let text = "";

        if (file.type === "application/pdf") {
            const buffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(buffer).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
        } else {
            text = await file.text();
        }

        // Clean: Zero duplication whitespace and artifacts
        text = text.replace(/\s+/g, ' ').trim();
        document.getElementById('raw-preview').value = text;
    }

    function generate() {
        const input = document.getElementById('raw-preview').value;
        if (!input) return alert("Knowledge input required.");

        // Structural Generation based on Architecture
        const entry = {
            instruction: "Extract logical core.",
            input: input,
            output: `1. Pratijna: [Thesis Derived]\n2. Hetu: [Framework: ${activeFrameworks.join(', ')}]\n3. Udaharana: ...\n4. Upanaya: ...\n5. Nigamana: ...`,
            metadata: {
                timestamp: new Date().toISOString(),
                frameworks: activeFrameworks,
                clean_status: "verified"
            }
        };

        masterData.push(entry);
        document.getElementById('db-count').innerText = masterData.length;
        document.getElementById('output-data').value = JSON.stringify(entry, null, 2);
    }

    function exportBatch() {
        if (masterData.length === 0) return alert("Dataset is empty.");
        const blob = new Blob([JSON.stringify(masterData, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MitSara_Knowledge_Pack_${Date.now()}.json`;
        a.click();
    }
</script>

</body>
</html>
