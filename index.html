<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MitSara Nexus | Production v15</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --saf: #FF9933; --grn: #138808; --nvy: #000080; --bg: #f0f2f5; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- STICKY TOP BAR --- */
        header { 
            background: #fff; padding: 12px 20px; border-bottom: 3px solid var(--nvy); 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .brand { font-weight: 900; font-size: 1rem; color: var(--nvy); letter-spacing: 1px; }
        .brand span { color: var(--saf); }
        .chakra { animation: spin 20s linear infinite; font-size: 1.3rem; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- VIRTUAL WORKSPACE --- */
        main { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px;
            padding-bottom: 120px; /* Space for Floating Island */
        }
        
        .card { background: #fff; border-radius: 16px; padding: 15px; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .label { font-size: 0.65rem; font-weight: 800; color: #777; text-transform: uppercase; margin-bottom: 8px; display: block; }

        /* --- INTERACTIVE MODULES --- */
        #term { background: #0a0a0a; color: #00ff00; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.7rem; height: 90px; overflow-y: auto; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 12px; font-size: 0.85rem; background: #fff; resize: none; min-height: 200px; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #eee; font-weight: 600; font-size: 0.8rem; background: #fff; color: var(--nvy); }

        /* --- THE FLOATING ISLAND (FIXED UI) --- */
        .floating-island {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            height: 70px; border-radius: 35px; border: 1px solid rgba(0,0,128,0.2);
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 2000;
            padding: 0 10px;
        }

        .island-btn { background: none; border: none; color: var(--nvy); font-size: 0.6rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .island-btn i { font-size: 1.2rem; }

        .ignite-bolt {
            width: 65px; height: 65px; border-radius: 50%; background: var(--nvy);
            color: #fff; border: 5px solid var(--bg); position: relative;
            top: -30px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; box-shadow: 0 5px 15px rgba(0,0,128,0.4);
            transition: 0.2s;
        }
        .ignite-bolt:active { transform: scale(0.9); }

        /* Settings Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: #fff; border-radius: 24px; padding: 25px; width: 100%; max-width: 400px; border-top: 6px solid var(--nvy); }
    </style>
</head>
<body>

<header>
    <i class="fas fa-dharmachakra chakra"></i>
    <div class="brand">MITSARA <span>NEXUS v15</span></div>
    <i class="fas fa-sliders-h" onclick="toggleModal('m-config')" style="color:var(--nvy)"></i>
</header>

<main>
    <div class="card">
        <span class="label"><i class="fas fa-bolt"></i> Source Inflow</span>
        <div onclick="document.getElementById('file-in').click()" style="border: 2px dashed var(--saf); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; color: var(--nvy); font-weight: bold; font-size: 0.75rem;">
            <i class="fas fa-file-export" style="font-size: 1.4rem; margin-bottom: 8px; color: var(--saf);"></i><br>
            INGEST PDF / TXT
            <input type="file" id="file-in" hidden onchange="handleInflow(this.files[0])">
        </div>
        <div id="term">> Awaiting Knowledge Stream...</div>
    </div>

    <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <span class="label">Architecture</span>
            <select id="arch"><option>Llama-3</option><option>Mistral</option></select>
        </div>
        <div>
            <span class="label">Logic</span>
            <select id="strat"><option>Nyaya</option><option>CoT</option></select>
        </div>
    </div>

    <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <span class="label">Intelligence Stream</span>
        <textarea id="out" placeholder="Dataset will generate here..."></textarea>
    </div>
</main>

<div class="floating-island">
    <button class="island-btn" onclick="copyData()"><i class="fas fa-copy"></i><span>COPY</span></button>
    <button class="island-btn" onclick="shareData()"><i class="fas fa-share-nodes"></i><span>SHARE</span></button>
    
    <div class="ignite-bolt" onclick="ignite()"><i class="fas fa-bolt"></i></div>
    
    <button class="island-btn" onclick="exportData()"><i class="fas fa-download"></i><span>EXPORT</span></button>
    <button class="island-btn" onclick="location.reload()"><i class="fas fa-sync"></i><span>RESET</span></button>
</div>

<div id="m-config" class="modal">
    <div class="modal-body">
        <h3 style="margin:0">Config</h3>
        <label class="label" style="margin-top:10px">Generation Count</label>
        <input type="number" id="g-count" value="10" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="toggleModal('m-config')" style="width:100%; margin-top:20px; background:var(--nvy); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">SAVE</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let db = [];
    let rawText = "";

    function log(m) {
        const t = document.getElementById('term');
        t.innerHTML += `<br>> ${m}`;
        t.scrollTop = t.scrollHeight;
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === "flex") ? "none" : "flex";
    }

    async function handleInflow(f) {
        if(!f) return;
        log(`Processing: ${f.name}`);
        if (f.type === "application/pdf") {
            const buffer = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
            rawText = text.replace(/\s+/g, ' ').trim();
        } else {
            rawText = await f.text();
        }
        log(`Success: ${rawText.length} tokens ready.`);
        document.getElementById('out').value = `[SOURCE READY]\n${rawText.substring(0, 300)}...`;
    }

    function ignite() {
        if(!rawText) return alert("Upload Source!");
        const count = document.getElementById('g-count').value;
        log(`Generating ${count} Nyaya sequences...`);
        const entry = {
            instruction: "Analysis Request",
            input: rawText.substring(0, 800),
            output: "1. Pratijna: [Thesis]\n2. Hetu: [Reasoning]\n3. Nigamana: [Success]",
            ts: Date.now()
        };
        db.push(entry);
        document.getElementById('out').value = JSON.stringify(db, null, 2);
    }

    function copyData() {
        const o = document.getElementById('out');
        o.select();
        document.execCommand('copy');
        alert("Copied!");
    }

    function exportData() {
        if(db.length === 0) return alert("Dataset empty!");
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "MitSara_Dataset.json";
        a.click();
    }

    function shareData() {
        if(navigator.share) navigator.share({title: 'MitSara Dataset', text: document.getElementById('out').value});
    }
</script>
</body>
</html>
