<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MitSara | Tiranga Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --saffron: #FF9933; --white: #FFFFFF; --green: #138808; --navy: #000080;
            --bg: #fdfdfd; --card-bg: rgba(255, 255, 255, 0.85); --shadow: rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        @keyframes marginPulse { 0% { margin: 10px; } 50% { margin: 12px; } 100% { margin: 10px; } }
        @keyframes glowPulse { 0% { box-shadow: 0 0 5px var(--saffron); } 50% { box-shadow: 0 0 20px var(--green); } 100% { box-shadow: 0 0 5px var(--navy); } }
        @keyframes textFlow { 0% { color: var(--saffron); } 33% { color: var(--navy); } 66% { color: var(--green); } 100% { color: var(--saffron); } }

        body { 
            font-family: 'Inter', system-ui, sans-serif; background: var(--bg); 
            color: #333; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- HEADER & ANIMATED LOGO --- */
        header {
            background: var(--white); border-bottom: 3px solid var(--navy);
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.1rem; animation: textFlow 5s infinite; letter-spacing: 1px; }
        .nav-icons i { font-size: 1.2rem; margin-left: 15px; cursor: pointer; color: var(--navy); transition: 0.3s; }
        .nav-icons i:hover { transform: scale(1.2) rotate(15deg); color: var(--saffron); }

        /* --- MAIN VIEWPORT --- */
        main { 
            flex: 1; overflow-y: auto; padding: 15px; 
            background: linear-gradient(180deg, rgba(255,153,51,0.05) 0%, rgba(255,255,255,1) 50%, rgba(19,136,8,0.05) 100%);
        }

        .card { 
            background: var(--card-bg); border-radius: 15px; padding: 15px; 
            margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 4px 10px var(--shadow);
            transition: all 0.3s ease; animation: marginPulse 4s infinite;
        }
        .card:hover { border: 1px solid var(--navy); box-shadow: 0 0 15px rgba(0,0,128,0.2); }

        /* --- STACKED GRID TOOLS --- */
        .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .tool-chip { 
            padding: 10px 5px; border-radius: 10px; background: white; border: 2px solid #f0f0f0;
            font-size: 0.65rem; font-weight: bold; text-align: center; cursor: pointer;
        }
        .tool-chip.active { border-color: var(--saffron); background: rgba(255,153,51,0.1); color: var(--saffron); }
        .tool-chip i { display: block; margin-bottom: 4px; font-size: 0.9rem; }

        textarea { 
            width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px;
            font-size: 0.8rem; background: #fafafa; transition: 0.3s; resize: none;
        }
        textarea:focus { border-color: var(--navy); background: #fff; outline: none; }

        /* --- EXECUTION BUTTON --- */
        .exec-area { padding: 10px 0; text-align: center; }
        .magic-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: none; 
            background: var(--navy); color: white; font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,128,0.3); cursor: pointer;
            transition: 0.3s; animation: glowPulse 3s infinite;
        }
        .magic-btn:active { transform: scale(0.9); }

        /* --- FOOTER CREDIT --- */
        footer { 
            background: var(--white); padding: 8px; text-align: center; 
            font-size: 0.65rem; border-top: 1px solid #eee; color: #666;
        }
        .credits b { color: var(--green); }

        /* --- CUSTOM SWITCHES --- */
        .switch-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 0.75rem; }
        input[type="checkbox"] { accent-color: var(--green); transform: scale(1.2); }

        .file-drop {
            border: 2px dashed var(--navy); border-radius: 12px; padding: 20px;
            text-align: center; font-size: 0.7rem; color: var(--navy); font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">MITSARA <i class="fas fa-dharmachakra"></i> CORE</div>
    <div class="nav-icons">
        <i class="fas fa-th-large" title="Dashboard"></i>
        <i class="fas fa-palette" title="Theme"></i>
        <i class="fas fa-sliders-h" title="Settings"></i>
    </div>
</header>

<main>
    <div class="card">
        <div class="file-drop" onclick="document.getElementById('fin').click()">
            <i class="fas fa-upload" style="font-size: 1.5rem; margin-bottom: 8px;"></i><br>
            INGEST KNOWLEDGE (PDF/MD/TXT)
            <input type="file" id="fin" hidden onchange="processFile(this.files[0])">
        </div>
        <textarea id="raw-ctx" rows="3" style="margin-top:10px;" placeholder="Pre-processed context..."></textarea>
    </div>

    <div class="card">
        <div class="tool-grid">
            <div class="tool-chip active" onclick="this.classList.toggle('active')"><i class="fas fa-brain"></i> CoT</div>
            <div class="tool-chip" onclick="this.classList.toggle('active')"><i class="fas fa-microchip"></i> RAG</div>
            <div class="tool-chip" onclick="this.classList.toggle('active')"><i class="fas fa-sitemap"></i> ToT</div>
            <div class="tool-chip" onclick="this.classList.toggle('active')"><i class="fas fa-shield-alt"></i> BiasFix</div>
            <div class="tool-chip" onclick="this.classList.toggle('active')"><i class="fas fa-clone"></i> De-Dup</div>
            <div class="tool-chip" onclick="exportData()"><i class="fas fa-file-export"></i> Export</div>
        </div>

        <div class="switch-row">
            <span>Clean Data Architecture</span>
            <input type="checkbox" checked>
        </div>
        <div class="switch-row">
            <span>Zero Duplication Engine</span>
            <input type="checkbox" checked>
        </div>
    </div>

    <div class="card">
        <textarea id="output" rows="5" placeholder="Intelligence Dataset Output..."></textarea>
    </div>

    <div class="exec-area">
        <button class="magic-btn" onclick="generate()"><i class="fas fa-bolt"></i></button>
        <p style="font-size: 0.6rem; color: var(--navy); margin-top: 5px; font-weight: bold;">GENERATE DATASET</p>
    </div>
</main>

<footer>
    <div class="credits">Fine-tuned Architecture by <b>MitSara AI</b> | 2026</div>
</footer>

<script>
    let db = [];

    async function processFile(f) {
        if (!f) return;
        const reader = new FileReader();
        if (f.type === "application/pdf") {
            const buf = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(buf).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ");
            }
            document.getElementById('raw-ctx').value = text.replace(/\s+/g, ' ').trim();
        } else {
            reader.onload = (e) => document.getElementById('raw-ctx').value = e.target.result;
            reader.readAsText(f);
        }
    }

    function generate() {
        const ctx = document.getElementById('raw-ctx').value;
        if (!ctx) return alert("Ingest Knowledge First");
        
        const entry = {
            instruction: "Identify logical derivation.",
            input: ctx.substring(0, 500),
            output: "1. Pratijna: [Generated]\n2. Hetu: [Nyaya Verified]\n3. Udaharana: ...\n4. Upanaya: ...\n5. Nigamana: ...",
            metadata: { architecture: "MitSara-v6", timestamp: Date.now() }
        };
        
        db.push(entry);
        document.getElementById('output').value = JSON.stringify(entry, null, 2);
        alert("Knowledge Sequenced!");
    }

    function exportData() {
        if (db.length === 0) return alert("Dataset Empty");
        const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `MitSara_Tiranga_Batch.json`;
        a.click();
    }
</script>

</body>
</html>
